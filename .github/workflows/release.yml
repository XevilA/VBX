name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore DispensingControlSystem/DispensingControlSystem.vbproj

      - name: Build Release
        run: dotnet publish DispensingControlSystem/DispensingControlSystem.vbproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.VERSION }} -o ./publish

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VBX Dispensing Control v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            ./publish/DispensingControlSystem.exe
