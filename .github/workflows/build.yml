name: 🔧 VBX Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

  # ★ Collaborators can trigger release from GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.6.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build Windows x64 Standalone EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠 Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 📦 Restore Dependencies
        run: dotnet restore DispensingControlSystem/DispensingControlSystem.vbproj

      - name: 🔨 Publish Standalone EXE
        run: |
          dotnet publish DispensingControlSystem/DispensingControlSystem.vbproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            -p:PublishTrimmed=false `
            -o ./Output/Standalone/win-x64

      - name: 📋 List Output Files
        run: |
          Write-Host "=== Build Output ==="
          Get-ChildItem -Path ./Output/Standalone/win-x64 -Recurse | Format-Table Name, Length -AutoSize

      - name: 📤 Upload Artifact (for PR/branch builds)
        uses: actions/upload-artifact@v4
        with:
          name: VBX-DispensingControl-win-x64
          path: Output/Standalone/win-x64/
          retention-days: 30
          if-no-files-found: error

      # === RELEASE: tag push OR manual workflow_dispatch ===
      - name: 🏷 Determine Version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Zip Release Package
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          Compress-Archive -Path ./Output/Standalone/win-x64/* -DestinationPath ./VBX-DispensingControl-${{ steps.ver.outputs.TAG }}-win-x64.zip

      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "VBX Dispensing Control ${{ steps.ver.outputs.TAG }}"
          body: |
            ## VBX Dispensing Control System — ${{ steps.ver.outputs.TAG }}

            ### 📥 Download
            ดาวน์โหลดไฟล์ `.zip` ด้านล่าง → แตกไฟล์ → รัน `DispensingControlSystem.exe`

            ### ℹ️ Requirements
            - Windows 10/11 x64
            - ไม่ต้องติดตั้ง .NET (Self-Contained)

            ### ⚠️ หมายเหตุ
            - ถ้า Windows SmartScreen ขึ้นเตือน → คลิก **More info** → **Run anyway**
          generate_release_notes: true
          files: ./VBX-DispensingControl-${{ steps.ver.outputs.TAG }}-win-x64.zip
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
